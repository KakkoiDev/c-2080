name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Verify committed build outputs match source
        run: |
          if ! git diff --exit-code -- index.html terminal.txt terminal-tldr.txt; then
            echo "::error::Build outputs are out of date. Run 'npm run build' and commit the result."
            exit 1
          fi
