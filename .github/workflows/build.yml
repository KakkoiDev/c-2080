name: Build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Verify committed index.html matches build
        run: |
          if ! git diff --exit-code -- index.html; then
            echo "::error::index.html is out of date. Run 'npm run build' and commit the result."
            exit 1
          fi
